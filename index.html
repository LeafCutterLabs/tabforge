<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tabFORGE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Library for ZIP packaging -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <link rel="stylesheet" href="./styles.css">
</head>
<body class="font-sans h-screen flex flex-col overflow-hidden">

    <header class="h-12 flex items-center justify-between px-3 shrink-0">
        <div class="flex items-center space-x-1">
            <div class="flex items-center space-x-2 text-accent mr-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-[18px] h-[18px]">
                    <path d="M9 22a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h8a2.4 2.4 0 0 1 1.704.706l3.588 3.588A2.4 2.4 0 0 1 23 8v12a2 2 0 0 1-2 2z"/>
                    <path d="M17 2v5a1 1 0 0 0 1 1h5"/>
                    <path d="M13 9H11"/>
                    <path d="M19 13H11"/>
                    <path d="M19 17H11"/>
                    <path d="M7 10H6a4 4 0 0 1-4-4 1 1 0 0 1 1-1h4"/>
                </svg>
                <span class="text-xs font-black uppercase tracking-tighter hidden sm:inline">tabForge</span>
            </div>
            <!-- FILE ACTIONS -->
            <div class="flex items-center space-x-0.5">
                <!-- NEW FILE ICON -->
                <button id="add-tab-btn" class="stable-btn hover:bg-white/10" title="New File"><i data-lucide="plus-square" class="w-[18px] h-[18px]"></i></button>
                <!-- DUPLICATE FILE ICON -->
                <button id="duplicate-tab-btn" class="stable-btn hover:bg-white/10" title="Duplicate Current File"><i data-lucide="copy-plus" class="w-[18px] h-[18px]"></i></button>
                <!-- IMPORT ICON -->
                <button id="import-btn" class="stable-btn hover:bg-white/10" title="Import Text Files">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M7 4h8l4 4v12H7z"/>
                        <path d="M15 4v4h4"/>
                        <path d="M4 8L11 15"/>
                        <path d="M11 8V15H4"/>
                    </svg>
                </button>
            </div>

            <input type="file" id="file-input" class="hidden" multiple accept=".txt">

            <div class="h-4 w-px bg-white/20 mx-1"></div>

            <div class="flex items-center space-x-0.5">
                <!-- EXPORT CURRENT ICON -->
                <button id="export-tab-btn" class="stable-btn hover:bg-white/10" title="Export Current Tab">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M7 4h8l4 4v12H7z"/>
                        <path d="M15 4v4h4"/>
                        <path d="M4 8L11 15"/>
                        <path d="M4 15V8H11"/>
                    </svg>
                </button>
                <!-- EXPORT ALL ICON -->
                <button id="export-all-btn" class="stable-btn hover:bg-white/10" title="Export All Tabs">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M7 4h8l4 4v12H7z"/>
                        <path d="M15 4v4h4M4 8l7 7m-7 0V8h7M9 23h13V8"/>
                    </svg>
                </button>
            </div>

            <div class="h-4 w-px bg-white/20 mx-1"></div>

            <div class="flex items-center space-x-1" id="toolbar-buttons">
                <!-- SAVE ICON -->
                <button id="manual-save-btn" class="stable-btn hover:bg-white/10" title="Save">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M5 4h12l2 2v14H5z"/>
                        <path d="M8 4v5h8V4"/>
                        <path d="M8 20v-6h8v6"/>
                    </svg>
                </button>
                <!-- SAVE ALL ICON -->
                <button id="manual-save-all-btn" class="stable-btn hover:bg-white/10" title="Save All">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M5 4h12l2 2v14H5z"/>
                        <path d="M8 4v5h8V4M8 20v-6h8v6"/>
                        <path d="M7 23h15V9"/>
                    </svg>
                </button>
                <!-- JUMP BACK ICON -->
                <button id="restore-save-btn" class="stable-btn hover:bg-white/10" title="Jump Back To Last Save"><i data-lucide="rotate-ccw" class="w-[18px] h-[18px]"></i></button>
                <!-- UNDO ICON -->
                <button id="undo-btn" class="stable-btn hover:bg-white/10" title="Undo"><i data-lucide="undo-2" class="w-[18px] h-[18px]"></i></button>
                <!-- REDO ICON -->
                <button id="redo-btn" class="stable-btn hover:bg-white/10" title="Redo"><i data-lucide="redo-2" class="w-[18px] h-[18px]"></i></button>
                <div class="h-4 w-px bg-white/20 mx-1"></div>
                <!-- LINE NUMBERS ICON -->
                <button id="toggle-line-numbers" class="stable-btn transition-all" title="Line Numbers"><i data-lucide="list-ordered" class="w-[18px] h-[18px]"></i></button>
                <!-- ZEBRA MODE ICON -->
                <button id="toggle-zebra" class="stable-btn transition-all" title="Zebra Mode">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="5" y="4" width="14" height="4" rx="1"/>
                        <rect x="5" y="10" width="14" height="4" rx="1" fill="currentColor" stroke="none"/>
                        <rect x="5" y="16" width="14" height="4" rx="1"/>
                    </svg>
                </button>
                <!-- WORD WRAP ICON -->
                <button id="toggle-word-wrap" class="stable-btn transition-all" title="Word Wrap">
                    <i data-lucide="text-wrap" class="w-[18px] h-[18px]"></i>
                </button>
                <!-- MAGIC OUTLINE ICON -->
                <button id="toggle-outline-mode" class="stable-btn transition-all" title="Toggle Magic Outline Mode">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="4" cy="3" r=".5"/>
                        <path d="M9 3h11"/>
                        <circle cx="7" cy="9" r=".5"/>
                        <path d="M12 9h8"/>
                        <circle cx="10" cy="15" r=".5"/>
                        <path d="M15 15h5"/>
                        <circle cx="4" cy="21" r=".5"/>
                        <path d="M9 21h11"/>
                    </svg>
                </button>
                <!-- TAB ORIENTATION ICON -->
                <button id="toggle-tab-orientation" class="stable-btn transition-all" title="Toggle Tab Orientation">
                    <svg id="orient-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></svg>
                </button>
                <!-- VIEW MODE ICON -->
                <button id="toggle-view-mode" class="stable-btn text-accent transition-colors hidden" title="Cycle View Layout">
                    <svg id="view-mode-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></svg>
                </button>
                <div class="h-4 w-px bg-white/20 mx-1"></div>
                <!-- FIND ICON -->
                <button id="open-find-btn" class="stable-btn hover:bg-white/10" title="Find"><i data-lucide="search" class="w-[18px] h-[18px]"></i></button>
                <div id="find-bar" class="hidden items-center gap-2 text-xs ml-1 min-w-0 flex-1">
                    <input id="find-input" type="text" class="min-w-[180px] flex-1 bg-white/90 text-slate-900 border border-slate-300 rounded px-2 py-1 outline-none" placeholder="Find in current tab">
                    <input id="replace-input" type="text" class="min-w-[180px] flex-1 bg-white/90 text-slate-900 border border-slate-300 rounded px-2 py-1 outline-none" placeholder="Replace">
                    <button id="find-next-btn" class="stable-btn hover:bg-white/10" title="Find Next"><i data-lucide="arrow-down" class="w-[18px] h-[18px]"></i></button>
                    <button id="replace-btn" class="stable-btn hover:bg-white/10" title="Replace Current"><i data-lucide="replace" class="w-[18px] h-[18px]"></i></button>
                    <button id="replace-all-btn" class="stable-btn hover:bg-white/10" title="Replace All"><i data-lucide="replace-all" class="w-[18px] h-[18px]"></i></button>
                    <label class="flex items-center gap-1 whitespace-nowrap text-[11px]">
                        <input id="find-fuzzy-toggle" type="checkbox" class="w-3.5 h-3.5">
                        <span>Fuzzy</span>
                    </label>
                    <div id="find-meta" class="min-w-[132px] text-right whitespace-nowrap">
                        <span id="find-count" class="opacity-80">0 matches</span>
                        <span class="opacity-40 px-1">|</span>
                        <span id="find-other-tabs">0:other</span>
                    </div>
                </div>
            </div>
        </div>
        <div class="flex items-center space-x-3">
            <!-- SETTINGS ICON -->
            <button id="open-settings-btn" class="stable-btn hover:bg-white/10 rounded transition-colors" title="Settings">
                <i data-lucide="settings" class="w-4 h-4"></i>
            </button>
            <div class="hidden md:flex items-center text-[10px] space-x-1 opacity-60">
                <i data-lucide="cloud-check" class="w-3 h-3 text-green-500"></i>
                <span id="save-status">Autosave Active</span>
            </div>
        </div>
    </header>

    <div id="app-body" class="flex flex-1 overflow-hidden flex-col">
        <nav id="tabs-container" class="flex shrink-0 overflow-auto no-scrollbar"></nav>
        <main id="editor-container" class="flex-1 relative overflow-hidden"></main>
    </div>

    <footer class="text-slate-400 text-[10px] px-3 h-6 flex justify-between items-center shrink-0">
        <div class="flex space-x-4 items-center">
            <span id="status-filename" class="font-bold text-accent uppercase tracking-widest">untitled.txt</span>
            <div class="h-3 w-px bg-slate-300 dark:bg-slate-700 mx-1"></div>
            <div class="flex items-center space-x-3">
                <span>Lines: <b id="stat-lines" class="text-current">1</b></span>
                <span>Words: <b id="stat-words" class="text-current">0</b></span>
                <span>Chars: <b id="stat-chars" class="text-current">0</b></span>
            </div>
        </div>
        <div class="flex items-center space-x-4">
            <div class="hidden sm:flex items-center opacity-80">
                <i data-lucide="clock" class="w-3 h-3 mr-1"></i>
                <span>Est. Read: <b id="stat-time">1m</b></span>
            </div>
            <span class="uppercase font-mono">UTF-8</span>
            <span id="status-mode" class="text-accent font-black uppercase tracking-tighter bg-accent/10 px-1.5 py-0.5 rounded">Editor Active</span>
        </div>
    </footer>

    <!-- Settings Overlay -->
    <div id="settings-overlay" class="fixed inset-0 bg-black/40 hidden z-[60] transition-opacity duration-200 opacity-0"></div>
    <aside id="settings-menu" class="fixed top-0 right-0 h-full w-64 bg-white border-l border-slate-200 z-[70] p-6 shadow-2xl transition-colors overflow-y-auto text-slate-800">
        <div class="flex items-center justify-between mb-8">
            <h2 class="text-xs font-bold uppercase tracking-widest text-slate-400">Settings</h2>
            <button id="close-settings-btn" class="p-1 hover:bg-slate-100 rounded text-slate-400"><i data-lucide="x" class="w-4 h-4"></i></button>
        </div>

        <div class="space-y-8">
            <div>
                <label class="block text-[10px] uppercase font-bold text-slate-500 mb-3">Interface Theme</label>
                <div class="grid grid-cols-2 gap-2">
                    <button class="mode-btn p-2 border border-slate-200 rounded text-[10px] font-bold uppercase hover:bg-slate-50 transition-colors" data-mode="default">Default</button>
                    <button class="mode-btn p-2 border border-slate-200 rounded text-[10px] font-bold uppercase hover:bg-slate-50 transition-colors" data-mode="light">Light</button>
                    <button class="mode-btn p-2 border border-slate-200 rounded text-[10px] font-bold uppercase hover:bg-slate-50 transition-colors" data-mode="dark">Dark</button>
                    <button class="mode-btn p-2 border border-slate-200 rounded text-[10px] font-bold uppercase hover:bg-slate-50 transition-colors" data-mode="matrix">Matrix</button>
                </div>
            </div>

            <div>
                <label class="block text-[10px] uppercase font-bold text-slate-500 mb-3">Accent Color</label>
                <div class="flex flex-wrap gap-2 mb-4" id="accent-swatches">
                    <div class="swatch bg-[#2563eb]" data-color="#2563eb"></div>
                    <div class="swatch bg-[#9333ea]" data-color="#9333ea"></div>
                    <div class="swatch bg-[#059669]" data-color="#059669"></div>
                    <div class="swatch bg-[#ea580c]" data-color="#ea580c"></div>
                    <div class="swatch bg-[#db2777]" data-color="#db2777"></div>
                </div>
                <div class="flex items-center bg-slate-50 rounded px-2 py-1.5 border border-slate-200">
                    <span class="text-[10px] font-mono text-slate-400 mr-2">#</span>
                    <input type="text" id="hex-accent" class="bg-transparent border-none outline-none text-xs font-mono w-full text-slate-600" maxlength="6" placeholder="2563eb">
                </div>
            </div>

            <div class="pt-4 border-t border-slate-100">
                <label class="block text-[10px] uppercase font-bold text-slate-500 mb-3">Export Preferences</label>
                <div class="flex items-center space-x-2">
                    <input type="checkbox" id="zip-export-toggle" class="w-4 h-4 rounded text-accent focus:ring-accent border-slate-300">
                    <label for="zip-export-toggle" class="text-xs text-slate-600">Package all exports as .zip</label>
                </div>
            </div>

            <div class="pt-4 border-t border-slate-100">
                <label class="block text-[10px] uppercase font-bold text-slate-500 mb-3">Normalization</label>
                <div class="space-y-4">
                    <input type="text" id="norm-separator" class="w-full bg-slate-50 border border-slate-200 rounded px-2 py-1 text-xs outline-none" placeholder=".">
                    <div class="bg-slate-50 rounded p-2 border border-slate-200">
                        <div class="text-[10px] font-mono text-slate-500" id="norm-example">1. Item Content</div>
                    </div>
                </div>
            </div>

            <div class="pt-4 border-t border-slate-100">
                <label class="block text-[10px] uppercase font-bold text-slate-500 mb-3">Outline Levels</label>
                <div class="space-y-2" id="outline-levels-settings">
                    <input type="text" data-level-index="0" class="outline-level-input w-full bg-slate-50 border border-slate-200 rounded px-2 py-1 text-xs outline-none" placeholder="I.">
                    <input type="text" data-level-index="1" class="outline-level-input w-full bg-slate-50 border border-slate-200 rounded px-2 py-1 text-xs outline-none" placeholder="A.">
                    <input type="text" data-level-index="2" class="outline-level-input w-full bg-slate-50 border border-slate-200 rounded px-2 py-1 text-xs outline-none" placeholder="1.">
                    <input type="text" data-level-index="3" class="outline-level-input w-full bg-slate-50 border border-slate-200 rounded px-2 py-1 text-xs outline-none" placeholder="a.">
                    <input type="text" data-level-index="4" class="outline-level-input w-full bg-slate-50 border border-slate-200 rounded px-2 py-1 text-xs outline-none" placeholder="i.">
                    <input type="text" data-level-index="5" class="outline-level-input w-full bg-slate-50 border border-slate-200 rounded px-2 py-1 text-xs outline-none" placeholder="(a)">
                    <input type="text" data-level-index="6" class="outline-level-input w-full bg-slate-50 border border-slate-200 rounded px-2 py-1 text-xs outline-none" placeholder="(i)">
                </div>
                <p class="text-[10px] text-slate-400 mt-2">Supported formats: I., A., 1., a., i., (A), (a), (I), (i)</p>
            </div>

            <div class="pt-4 border-t border-slate-100">
                <button id="reset-theme-btn" class="w-full py-2 bg-slate-50 hover:bg-slate-100 text-slate-400 rounded text-[10px] font-bold uppercase transition-colors">Restore Defaults</button>
            </div>
        </div>
    </aside>

    <script src="./tab-model.js"></script>
    <script src="./persistence.js"></script>
    <script src="./commands.js"></script>
    <script src="./app.js"></script>
</body>
</html>
